services:
  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: visioagua_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: visioagua
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: visioagua_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:adminpassword@db:5432/visioagua
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: visioagua_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  pgdata:
